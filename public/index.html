<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tervux Bot Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: #38bdf8; margin-bottom: 5px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #334155;
            border-radius: 6px;
            background-color: #0f172a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            border-color: #38bdf8;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #0ea5e9; }
        .code-display {
            margin-top: 20px;
            padding: 15px;
            background-color: #0f172a;
            border: 2px dashed #38bdf8;
            border-radius: 6px;
            font-size: 24px;
            font-family: monospace;
            letter-spacing: 5px;
            color: #4ade80;
            display: none;
        }
        .loading { display: none; color: #e2e8f0; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>TERVUX BOT</h1>
    <p>Ingiza namba yako ya WhatsApp kupata Pairing Code</p>
    
    <input type="text" id="phone" placeholder="Mfano: 255712345678">
    <button onclick="getPairingCode()">Omba Pairing Code</button>

    <div class="loading" id="loading">Inatengeneza kodi, subiri kidogo...</div>
    <div class="code-display" id="codeDisplay"></div>
</div>

<script>
    async function getPairingCode() {
        const phoneInput = document.getElementById('phone').value.trim();
        const loading = document.getElementById('loading');
        const codeDisplay = document.getElementById('codeDisplay');

        if(!phoneInput) {
            alert('Tafadhali weka namba ya simu!');
            return;
        }

        loading.style.display = 'block';
        codeDisplay.style.display = 'none';

        try {
            const response = await fetch('/api/pairing-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: phoneInput })
            });
            const data = await response.json();

            loading.style.display = 'none';

            if(data.success && data.code) {
                codeDisplay.innerText = data.code;
                codeDisplay.style.display = 'block';
            } else {
                alert('Makosa: ' + (data.error || 'Imeshindikana.'));
            }
        } catch (error) {
            loading.style.display = 'none';
            alert('Mawasiliano na Seva yamefeli!');
        }
    }
</script>
</body>
  </html>
